name: GateKeeper

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      # Live SonarCloud path activates automatically when SONAR_TOKEN is configured.
      HAVE_SONAR: ${{ secrets.SONAR_TOKEN != '' }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      # Set repo variable GATEKEEPER_ENFORCE=true to block merges on a failed gate.
      GATEKEEPER_ENFORCE: ${{ vars.GATEKEEPER_ENFORCE || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # SonarCloud needs full history for accurate blame

      # ---- Live SonarCloud analysis (skipped in demo mode) ----
      - name: SonarCloud scan
        if: env.HAVE_SONAR == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Wait for SonarCloud processing
        if: env.HAVE_SONAR == 'true'
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      # ---- Run the agent quality gate ----
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run GateKeeper
        id: gate
        continue-on-error: true # always reach the comment step below
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        run: python -m app.cli --source auto --output gatekeeper-report.md

      - name: Post quality-gate comment
        if: always() && github.event.pull_request.head.repo.fork == false
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: gatekeeper
          path: gatekeeper-report.md

      - name: Enforce gate
        if: steps.gate.outputs.gate == 'FAIL' && env.GATEKEEPER_ENFORCE == 'true'
        run: |
          echo "::error::GateKeeper quality gate FAILED — blocking merge."
          exit 1
