name: GateKeeper

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      # SonarCloud analyzes the repo automatically; GateKeeper pulls those
      # findings via the API and runs the agent gate on them. No scanner step.
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      # Diff-aware: gate only on issues new in this PR.
      PR_NUMBER: ${{ github.event.pull_request.number }}
      # Set repo variable GATEKEEPER_ENFORCE=true to block merges on a failed gate.
      GATEKEEPER_ENFORCE: ${{ vars.GATEKEEPER_ENFORCE || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run GateKeeper
        id: gate
        continue-on-error: true # always reach the comment step below
        run: python -m app.cli --source auto --output gatekeeper-report.md

      - name: Post quality-gate comment
        if: always() && github.event.pull_request.head.repo.fork == false
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: gatekeeper
          path: gatekeeper-report.md

      - name: Enforce gate
        if: steps.gate.outputs.gate == 'FAIL' && env.GATEKEEPER_ENFORCE == 'true'
        run: |
          echo "::error::GateKeeper quality gate FAILED — blocking merge."
          exit 1
